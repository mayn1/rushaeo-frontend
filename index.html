<script>
  const auditForm = document.querySelector('form');
  
  if (auditForm) {
    auditForm.removeAttribute('action');
    
    auditForm.addEventListener('submit', (e) => {
      e.preventDefault(); 

      const name = encodeURIComponent(document.getElementById('customerName')?.value || 'Enterprise Operator');
      const email = encodeURIComponent(document.getElementById('customerEmail')?.value || '');
      let rawUrl = document.getElementById('targetUrl')?.value || '';
      rawUrl = rawUrl.trim();

      if (!email || !rawUrl) {
        alert('Please fill out all required fields.');
        return;
      }

      // Standardize the URL format before appending
      let structuredUrl = rawUrl;
      if (structuredUrl && !/^https?:\/\//i.test(structuredUrl)) {
        structuredUrl = 'https://' + structuredUrl;
      }
      const targetDomain = encodeURIComponent(structuredUrl);

      const submitBtn = auditForm.querySelector('button[type="submit"]');
      if (submitBtn) submitBtn.innerText = 'REDIRECTING TO SECURE PAYMENT PORTAL...';

      // Forwarding to Wise payment loop with clean metadata query routing strings
      window.location.href = `https://wise.com/pay/r/YPPMjOo5dtuym44?name=${name}&email=${email}&domain=${targetDomain}`;
    });
  }
</script>
